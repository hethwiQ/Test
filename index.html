<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OG Status | Talsy</title>

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Talsy" />
    <meta property="og:url" content="https://hethwiq.github.io/Test/" />
    <meta property="og:title" content="Talsy - AI Powered Recruitment Platform" />
    <meta property="og:description" content="Test page for dynamic link previews. Empowering careers with smart automation." />
    
    <meta property="og:image" content="https://raw.githubusercontent.com/hethwiQ/siteassets/refs/heads/main/images/Talsy-Test/OG-Main-3-lightmascot.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Talsy Dashboard Preview" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Talsy - AI Powered Recruitment Platform" />
    <meta name="twitter:description" content="Test page for dynamic link previews. Empowering careers with smart automation." />
    <meta name="twitter:image" content="https://raw.githubusercontent.com/hethwiQ/siteassets/refs/heads/main/images/Talsy-Test/OG-Main-3-lightmascot.jpg" />

    <style>
        /* Fast.com Minimalist Style */
        :root {
            --text-main: #1d1d1f;
            --text-light: #86868b;
            --green: #2ecc71; /* Fast.com Green */
        }

        body {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: var(--text-main);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* The Big "Speed" Number Look */
        h1 {
            font-size: 15vw; /* Responsive huge text */
            font-weight: 500;
            margin: 0;
            line-height: 1;
            letter-spacing: -4px;
        }

        .unit {
            font-size: 3vw;
            color: var(--text-main);
            vertical-align: super;
            margin-left: 10px;
        }

        .status-text {
            color: var(--green);
            font-size: 1.5rem;
            margin-top: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Minimal Debug Info */
        .debug-container {
            margin-top: 60px;
            text-align: left;
            border-top: 1px solid #eee;
            padding-top: 20px;
            width: 90%;
            max-width: 400px;
        }

        .debug-item {
            display: flex;
            justify-content: space-between;
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--text-light);
            margin-bottom: 8px;
            padding: 8px 0;
            border-bottom: 1px solid #f5f5f5;
        }

        .debug-label { color: #000; font-weight: 600; }
        .debug-value { color: var(--green); }
        .debug-value.error { color: #e74c3c; }

    </style>
</head>
<body>

    <div>
        <h1>Ready<span class="unit">✓</span></h1>
        <div class="status-text">OG Metadata Active</div>
    </div>

    <div class="debug-container" id="debug-output">
        </div>

    <script>
        const tags = [
            { label: 'Image Size', value: '1200 x 630' }, // Hardcoded confirmation
            { label: 'File Type', value: 'JPG (<300KB)' },
            { prop: 'og:image', label: 'Image URL' },
            { name: 'twitter:card', label: 'Card Type' }
        ];

        const container = document.getElementById('debug-output');

        tags.forEach(tag => {
            const row = document.createElement('div');
            row.className = 'debug-item';

            let displayValue = tag.value;
            let isError = false;

            // If it's a dynamic tag, fetch from DOM
            if (tag.prop || tag.name) {
                let el;
                if (tag.prop) el = document.querySelector(`meta[property="${tag.prop}"]`);
                if (tag.name) el = document.querySelector(`meta[name="${tag.name}"]`);
                
                if (el) {
                    displayValue = "Found";
                } else {
                    displayValue = "Missing";
                    isError = true;
                }
            }

            row.innerHTML = `
                <span class="debug-label">${tag.label}</span>
                <span class="debug-value ${isError ? 'error' : ''}">${displayValue}</span>
            `;
            container.appendChild(row);
        });
    </script>
</body>
</html>
